# Dependabot keeps GitHub Actions workflow dependencies up to date.
# Runs weekly; opens PRs when a pinned action has a newer version.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "ci"
      - "dependencies"
